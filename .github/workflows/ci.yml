name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Dockerfile'
      - '**/*.cs'
      - '**/*.csproj'
      - '.github/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Dockerfile'
      - '**/*.cs'
      - '**/*.csproj'
      - '.github/**'

env:
  COVERAGE_THRESHOLD: 75

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      packages: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name and tag
        uses: ./.github/actions/setup-image-metadata

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (includes tests + coverage)
        uses: docker/build-push-action@v6
        with:
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy coverage report from container
        uses: ./.github/actions/copy-container-coverage
        with:
          container-tag: $IMAGE_NAME:$IMAGE_TAG
          target-path: coverage

      - name: Generate HTML and Summary.xml
        uses: ./.github/actions/generate-coverage-report
        with:
          input-dir: coverage
          output-dir: coverage-report

      - name: Enforce coverage threshold
        uses: ./.github/actions/enforce-coverage-threshold
        with:
          summary-path: coverage-report/Summary.xml
          threshold: ${{ env.COVERAGE_THRESHOLD }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: coverage-report

      - name: Publish unit test report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Unit Tests
          path: coverage/**/*.trx
          reporter: dotnet-trx
          fail-on-error: true

  integration-tests:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: ratatosk_test
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Run integration tests
        run: dotnet test tests/IntegrationTests --configuration Release --verbosity normal

  check-formatting:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Verify formatting
        run: dotnet format --verify-no-changes --severity error --verbosity detailed

  release:
    needs: [build-and-test, integration-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      released: ${{ steps.semantic.outputs.released }}
      new-version: ${{ steps.semantic.outputs.new-version }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install semantic-release
        run: npm install --no-save semantic-release @semantic-release/commit-analyzer @semantic-release/release-notes-generator @semantic-release/changelog @semantic-release/github @semantic-release/git

      - name: Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BEFORE=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          npx semantic-release
          AFTER=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          if [ "$AFTER" != "$BEFORE" ] && [ "$AFTER" != "none" ]; then
            echo "released=true" >> $GITHUB_OUTPUT
            echo "new-version=${AFTER#v}" >> $GITHUB_OUTPUT
          else
            echo "released=false" >> $GITHUB_OUTPUT
          fi

  publish:
    needs: [build-and-test, integration-tests, release]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name and tag
        uses: ./.github/actions/setup-image-metadata

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: tags
        run: |
          TAGS="${IMAGE_NAME}:${IMAGE_TAG}"
          if [ "${{ needs.release.outputs.released }}" = "true" ]; then
            TAGS="${TAGS}
${IMAGE_NAME}:${{ needs.release.outputs.new-version }}
${IMAGE_NAME}:latest"
          fi
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "$TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and push image to GHCR
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
