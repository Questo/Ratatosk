name: CI

on:
  push:
    branches: [main]
    tags: ["*"]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Dockerfile'
      - '**/*.cs'
      - '**/*.csproj'
      - '.github/**'

env:
  COVERAGE_THRESHOLD: 75

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      packages: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name and tag
        uses: ./.github/actions/setup-image-metadata

      - name: Build Docker image (includes tests + coverage)
        run: docker build -t $IMAGE_NAME:$IMAGE_TAG .

      - name: Copy coverage report from container
        uses: ./.github/actions/copy-container-coverage
        with:
          container-tag: $IMAGE_NAME:$IMAGE_TAG
          target-path: coverage

      - name: Generate HTML and Summary.xml
        uses: ./.github/actions/generate-coverage-report
        with:
          input-dir: coverage
          output-dir: coverage-report

      - name: Enforce coverage threshold
        uses: ./.github/actions/enforce-coverage-threshold
        with:
          summary-path: coverage-report/Summary.xml
          threshold: ${{ env.COVERAGE_THRESHOLD }}

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage-report

      - name: Publish unit test report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Unit Tests
          path: coverage/**/*.trx
          reporter: dotnet-trx
          fail-on-error: true

  integration-tests:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: ratatosk_test
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Run integration tests
        run: dotnet test tests/IntegrationTests --configuration Release --verbosity normal

  publish:
    needs: [build-and-test, integration-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name and tag
        uses: ./.github/actions/setup-image-metadata

      - name: Build and push image to GHCR
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG .
          docker push $IMAGE_NAME:$IMAGE_TAG
