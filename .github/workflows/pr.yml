name: Pull Request Checks

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Dockerfile'
      - '**/*.cs'
      - '**/*.csproj'
      - '.github/**'

permissions:
  contents: read
  checks: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set image name and tag
        uses: ./.github/actions/setup-image-metadata
        with:
          image-tag: pr-${{ github.sha }}

      - name: Build Docker image (runs unit tests inside)
        run: docker build -t $IMAGE_NAME:$IMAGE_TAG .

      - name: Copy coverage from container
        uses: ./.github/actions/copy-container-coverage
        with:
          container-tag: $IMAGE_NAME:$IMAGE_TAG
          target-path: coverage

      - name: Generate HTML and Summary.xml
        uses: ./.github/actions/generate-coverage-report
        with:
          input-dir: coverage
          output-dir: coverage-report

      - name: Publish unit test results
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Unit Tests
          path: coverage/**/*.trx
          reporter: dotnet-trx
          fail-on-error: true

      - name: Upload PR coverage report
        uses: actions/upload-artifact@v4
        with:
          name: pr-coverage-html
          path: coverage-report

  integration-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: ratatosk_test
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Run integration tests
        run: dotnet test tests/IntegrationTests --configuration Release --verbosity normal

  check-formatting:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Verify formatting
        run: dotnet format --verify-no-changes --severity error --verbosity detailed
